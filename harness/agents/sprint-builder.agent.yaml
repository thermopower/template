apiVersion: harness/v1
kind: Agent
metadata:
  name: sprint-builder
  description: 승인된 sprint-contract 범위만 구현한다. 범위를 넘지 않는다.
spec:
  role: orchestrator
  maxIterations: 80
  requiredTools:
  - file:read
  - file:write
  - file:edit
  - file:search
  - code:search
  - shell:exec
  - agent:invoke
  promptRef: prompts/base/sprint-builder.md
  adapterOverrides:
    claude-code:
      model: sonnet
      memory: project
      tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Bash
      - Agent
      permission_mode: acceptEdits

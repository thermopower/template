apiVersion: harness/v1
kind: Agent
metadata:
  name: retrospective
  description: sprint 루프 종료 후 자동 실행. 정량 지표 분석 및 learnings 누적. 파일 수정은 learnings.md와
    metrics.json만 허용.
spec:
  role: worker
  maxIterations: 20
  requiredTools:
  - file:read
  - file:write
  - file:edit
  - shell:exec
  - file:search
  - code:search
  promptRef: prompts/base/retrospective.md
  adapterOverrides:
    claude-code:
      model: haiku
      memory: project
      tools:
      - Read
      - Write
      - Edit
      - Bash
      - Glob
      - Grep

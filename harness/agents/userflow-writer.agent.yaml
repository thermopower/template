apiVersion: harness/v1
kind: Agent
metadata:
  name: userflow-writer
  description: 요구사항을 바탕으로 userflow를 설계
spec:
  role: worker
  maxIterations: 20
  requiredTools:
  - file:read
  - file:write
  - file:edit
  - file:search
  - code:search
  - agent:invoke
  promptRef: prompts/base/userflow-writer.md
  adapterOverrides:
    claude-code:
      model: sonnet
      memory: project
      tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Agent

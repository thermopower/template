apiVersion: harness/v1
kind: Agent
metadata:
  name: implementer
  description: 제공된 구현 계획을 기반으로, 견고한 코드를 구현
spec:
  role: worker
  maxIterations: 60
  requiredTools:
  - file:read
  - file:write
  - file:edit
  - file:search
  - code:search
  - shell:exec
  - agent:invoke
  promptRef: prompts/base/implementer.md
  adapterOverrides:
    claude-code:
      model: sonnet
      tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Bash
      - Agent

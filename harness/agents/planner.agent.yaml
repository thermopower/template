apiVersion: harness/v1
kind: Agent
metadata:
  name: planner
  description: 요구사항을 읽고 설계 문서 일체를 생성한 뒤 sprint-contract 초안을 작성한다. 첫 번째 sprint만 사용자
    승인을 받고, 이후 sprint는 자동 승인한다. 구현하지 않는다.
spec:
  role: orchestrator
  maxIterations: 40
  requiredTools:
  - file:read
  - file:write
  - file:edit
  - file:search
  - code:search
  - agent:invoke
  promptRef: prompts/base/planner.md
  adapterOverrides:
    claude-code:
      model: sonnet
      memory: project
      tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Agent

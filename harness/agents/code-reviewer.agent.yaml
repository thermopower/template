apiVersion: harness/v1
kind: Agent
metadata:
  name: code-reviewer
  description: sprint 내부에서 implementer가 작성한 코드를 리뷰한다. major 이상 문제만 피드백하고 LGTM 또는 NEEDS_WORK를
    반환한다.
spec:
  role: reviewer
  maxIterations: 20
  requiredTools:
  - file:read
  - file:search
  - code:search
  - shell:exec
  - agent:invoke
  promptRef: prompts/base/code-reviewer.md
  adapterOverrides:
    claude-code:
      model: sonnet
      tools:
      - Read
      - Glob
      - Grep
      - Bash
      - Agent

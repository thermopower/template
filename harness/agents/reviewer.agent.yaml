apiVersion: harness/v1
kind: Agent
metadata:
  name: reviewer
  description: evaluation pass 이후 코드와 UX를 품질 관점에서 비평하고 개선 방향을 제안한다. pass/fail 판정은
    하지 않는다.
spec:
  role: reviewer
  maxIterations: 40
  requiredTools:
  - file:read
  - file:write
  - file:edit
  - file:search
  - code:search
  - agent:invoke
  - shell:exec
  promptRef: prompts/base/reviewer.md
  adapterOverrides:
    claude-code:
      model: opus
      memory: project
      tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Agent
      - Bash

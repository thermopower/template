apiVersion: harness/v1
kind: Agent
metadata:
  name: policy-updater
  description: learnings 기반으로 에이전트/정책 개정안을 생성한다. 업데이트 우선, 신규 파일 최소 생성. 사용자 승인 후에만
    파일 적용.
spec:
  role: worker
  maxIterations: 30
  requiredTools:
  - file:read
  - file:write
  - file:edit
  - file:search
  - code:search
  promptRef: prompts/base/policy-updater.md
  adapterOverrides:
    claude-code:
      model: sonnet
      memory: project
      tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep

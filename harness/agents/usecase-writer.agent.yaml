apiVersion: harness/v1
kind: Agent
metadata:
  name: usecase-writer
  description: userflow를 바탕으로 기능별 usecase를 작성
spec:
  role: worker
  maxIterations: 20
  requiredTools:
  - file:read
  - file:write
  - file:edit
  - file:search
  - code:search
  - agent:invoke
  promptRef: prompts/base/usecase-writer.md
  adapterOverrides:
    claude-code:
      model: sonnet
      memory: project
      tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Agent

apiVersion: harness/v1
kind: Agent
metadata:
  name: dataflow-writer
  description: userflow를 기반으로, dataflow와 데이터베이스 스키마를 설계
spec:
  role: worker
  maxIterations: 20
  requiredTools:
  - file:read
  - file:write
  - file:edit
  - file:search
  - code:search
  - agent:invoke
  promptRef: prompts/base/dataflow-writer.md
  adapterOverrides:
    claude-code:
      model: sonnet
      memory: project
      tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Agent
